name: Deployment

concurrency:
  group: production
  cancel-in-progress: true

on:
  schedule:
    - cron: "5 12 * * 1"
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCE_PROJECT }}
  GCE_INSTANCE: rollbot-vm
  GCE_INSTANCE_ZONE: us-central1-a  

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest

    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCE_SA_KEY }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - run: |-
          gcloud --quiet auth configure-docker us-central1-docker.pkg.dev
      - name: Build
        run: |-
          docker build --tag "us-central1-docker.pkg.dev/$PROJECT_ID/rollbot-vm/$GCE_INSTANCE-image:$GITHUB_SHA" .
      - name: Publish
        run: |-
          docker push "us-central1-docker.pkg.dev/$PROJECT_ID/rollbot-vm/$GCE_INSTANCE-image:$GITHUB_SHA"
      - name: Deploy
        run: |-
          IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/rollbot-vm/$GCE_INSTANCE-image:$GITHUB_SHA"
          NEW_NAME="rollbot-${GITHUB_SHA:0:8}"
          # Update startup script so the correct image is used on any future reboot
          gcloud compute instances add-metadata "$GCE_INSTANCE" \
            --zone "$GCE_INSTANCE_ZONE" \
            --metadata=startup-script="#! /bin/bash
              export HOME=/home/appuser
              docker-credential-gcr configure-docker --registries us-central1-docker.pkg.dev
              docker stop \$(docker ps -q) || true
              docker rm \$(docker ps -aq) || true
              docker image prune -af
              docker pull $IMAGE
              docker run -d \
                --name rollbot \
                --restart always \
                --volume /mnt/data:/etc/data \
                $IMAGE"
          # Zero-downtime: start new container alongside the old one, wait for it
          # to connect to Discord, then stop everything else.
          gcloud compute ssh "$GCE_INSTANCE" \
            --zone "$GCE_INSTANCE_ZONE" \
            --command "
              set -e
              export HOME=/home/appuser
              docker-credential-gcr configure-docker --registries us-central1-docker.pkg.dev

              docker pull $IMAGE
              docker run -d \
                --name $NEW_NAME \
                --restart always \
                --volume /mnt/data:/etc/data \
                $IMAGE

              echo 'Waiting for $NEW_NAME to be ready...'
              for i in \$(seq 1 60); do
                if docker logs $NEW_NAME 2>&1 | grep -q 'Logged in'; then
                  echo 'Ready.'
                  break
                fi
                if [ \$i -eq 60 ]; then
                  echo 'Timed out waiting for $NEW_NAME.' >&2
                  docker stop $NEW_NAME || true
                  docker rm $NEW_NAME || true
                  exit 1
                fi
                sleep 1
              done

              # Stop all containers except the new one
              NEW_ID=\$(docker inspect --format='{{.Id}}' $NEW_NAME | head -c 12)
              docker ps -q | grep -v \$NEW_ID | xargs -r docker stop

              docker image prune -af
            "
